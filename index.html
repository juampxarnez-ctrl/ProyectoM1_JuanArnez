<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Paletas</title>
  <link rel="stylesheet" href="styles.css">
  
</head>

<body>

  <header>
  <h1>Generador de Paletas</h1>
 </header>

<main>

<section class="controls"> 

<label for="size">Tamaño de la paleta:</label>
<select id="size">
<option value="6">6</option>
<option value="8">8</option>
<option value="9">9</option>
</select>

<label for="format">Formato:</label>
<select id="format">
  <option value="hex">HEX</option>
  <option value="hsl">HSL</option>
</select>

<button id="generateBtn">
Generar Paleta
</button>

</section>
  
 <section id="palette" aria-live="polite">
 </section>

 <div id="toast" class="toast">
  Paleta Generada!
</div>

</main>
<script src="script.js"></script>

<footer>
  <p>© 2026 Generador de Paletas por Arnez Juan Pablo. Todos los derechos reservados.</p>
</footer>
  
</body>
</html>
